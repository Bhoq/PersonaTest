<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaTest</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      margin-top: 20px;
    }
    h1 {
      margin-bottom: 6px;
    }
    .muted {
      color: #666;
      margin-bottom: 12px;
    }
    .progress {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    .question {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .option {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      background: #fafafa;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
    }
    .option:hover {
      background: #eef4ff;
    }
    .hidden {
      display: none;
    }
    .result-item {
      margin: 8px 0;
      font-size: 17px;
    }
    .restart {
      margin-top: 20px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PersonaTest</h1>
    <div class="muted">Personality test</div>

    <div class="card" id="quizCard">
      <div class="progress" id="progress"></div>
      <div class="question" id="question"></div>
      <div id="answers"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2>Your Result</h2>
      <p id="summary"></p>

      <div class="result-item"><strong>Openness:</strong> <span id="openness"></span></div>
      <div class="result-item"><strong>Conscientiousness:</strong> <span id="conscientiousness"></span></div>
      <div class="result-item"><strong>Extraversion:</strong> <span id="extraversion"></span></div>
      <div class="result-item"><strong>Agreeableness:</strong> <span id="agreeableness"></span></div>
      <div class="result-item"><strong>Emotional Stability:</strong> <span id="stability"></span></div>

      <button class="restart" onclick="restartQuiz()">Restart</button>
    </div>
  </div>

  <script>
    const questions = [
      { q: "You enjoy exploring new ideas and unfamiliar topics.", trait: "openness" },
      { q: "You like to stay organized and follow a plan.", trait: "conscientiousness" },
      { q: "You feel energized after spending time with other people.", trait: "extraversion" },
      { q: "You usually try to keep harmony and avoid conflict.", trait: "agreeableness" },
      { q: "You stay calm under pressure.", trait: "stability" },
      { q: "You enjoy creativity, imagination, or artistic ideas.", trait: "openness" },
      { q: "You follow through on tasks and responsibilities.", trait: "conscientiousness" },
      { q: "You are comfortable starting conversations.", trait: "extraversion" },
      { q: "You are considerate of others' feelings.", trait: "agreeableness" },
      { q: "You recover quickly from stress.", trait: "stability" },
      { q: "You are curious about different perspectives.", trait: "openness" },
      { q: "You like routines that help you stay productive.", trait: "conscientiousness" },
      { q: "You enjoy group settings more than being alone.", trait: "extraversion" },
      { q: "People would describe you as warm and cooperative.", trait: "agreeableness" },
      { q: "You do not get overwhelmed easily.", trait: "stability" },
      { q: "You like experimenting with new approaches.", trait: "openness" },
      { q: "You pay attention to detail.", trait: "conscientiousness" },
      { q: "You are comfortable speaking up in public.", trait: "extraversion" },
      { q: "You often put others into consideration.", trait: "agreeableness" },
      { q: "You stay emotionally balanced in hard situations.", trait: "stability" },
      { q: "You enjoy learning things that challenge your thinking.", trait: "openness" },
      { q: "You prefer structure over chaos.", trait: "conscientiousness" },
      { q: "You are outgoing in social situations.", trait: "extraversion" },
      { q: "You tend to be supportive and trusting.", trait: "agreeableness" },
      { q: "You handle setbacks without falling apart.", trait: "stability" }
    ];

    const options = [
      { label: "Strongly Disagree", value: 1 },
      { label: "Disagree", value: 2 },
      { label: "Neutral", value: 3 },
      { label: "Agree", value: 4 },
      { label: "Strongly Agree", value: 5 }
    ];

    let current = 0;
    let scores = {
      openness: 0,
      conscientiousness: 0,
      extraversion: 0,
      agreeableness: 0,
      stability: 0
    };

    function renderQuestion() {
      const q = questions[current];
      document.getElementById("progress").textContent = "Question " + (current + 1) + " of " + questions.length;
      document.getElementById("question").textContent = q.q;

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = opt.label;
        btn.onclick = function() {
          scores[q.trait] += opt.value;
          current++;
          if (current < questions.length) {
            renderQuestion();
          } else {
            showResults();
          }
        };
        answersDiv.appendChild(btn);
      });
    }

    function level(score) {
      if (score >= 22) return "High";
      if (score >= 16) return "Moderate";
      return "Low";
    }

    function showResults() {
      document.getElementById("quizCard").classList.add("hidden");
      document.getElementById("resultCard").classList.remove("hidden");

      document.getElementById("openness").textContent = scores.openness + "/25 (" + level(scores.openness) + ")";
      document.getElementById("conscientiousness").textContent = scores.conscientiousness + "/25 (" + level(scores.conscientiousness) + ")";
      document.getElementById("extraversion").textContent = scores.extraversion + "/25 (" + level(scores.extraversion) + ")";
      document.getElementById("agreeableness").textContent = scores.agreeableness + "/25 (" + level(scores.agreeableness) + ")";
      document.getElementById("stability").textContent = scores.stability + "/25 (" + level(scores.stability) + ")";

      document.getElementById("summary").textContent =
        "This is a simple Big Five style personality snapshot based on your responses.";
    }

    function restartQuiz() {
      current = 0;
      scores = {
        openness: 0,
        conscientiousness: 0,
        extraversion: 0,
        agreeableness: 0,
        stability: 0
      };
      document.getElementById("resultCard").classList.add("hidden");
      document.getElementById("quizCard").classList.remove("hidden");
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
