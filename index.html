<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaTest</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 24px;
      margin-top: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    .subtitle {
      color: #666;
      margin-bottom: 20px;
    }
    .progress {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }
    .question {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    button.option {
      border: 1px solid #ddd;
      background: #fafafa;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
    }
    button.option:hover {
      background: #eef4ff;
      border-color: #7aa7ff;
    }
    .result {
      display: none;
    }
    .score-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
    }
    .restart {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    .trait {
      margin: 8px 0;
      font-size: 16px;
    }
    .small {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PersonaTest</h1>
    <div class="subtitle">Personality test</div>

    <div class="card" id="quizCard">
      <div class="progress" id="progress"></div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
    </div>

    <div class="card result" id="resultCard">
      <h2>Your Personality Snapshot</h2>
      <p id="summary"></p>

      <div class="score-box">
        <div class="trait"><strong>Openness:</strong> <span id="openScore"></span></div>
        <div class="trait"><strong>Conscientiousness:</strong> <span id="consScore"></span></div>
        <div class="trait"><strong>Extraversion:</strong>
